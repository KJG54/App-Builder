version: '3.8'

services:
  chroma:
    image: chromadb/chroma:latest
    container_name: app-builder-chroma
    ports:
      - "8000:8000"
    volumes:
      - ./docker/volumes/chroma:/chroma/data
    environment:
      - CHROMA_SERVER_AUTH_PROVIDER=none
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    networks:
      - app-builder-network

networks:
  app-builder-network:
    driver: bridge
