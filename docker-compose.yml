version: '3.8'

services:
  chroma:
    image: chromadb/chroma:latest
    container_name: app-builder-chroma
    ports:
      - "8000:8000"
    volumes:
      - ./docker/volumes/chroma:/chroma/data
    environment:
      - CHROMA_SERVER_AUTH_PROVIDER=none
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-builder-network

networks:
  app-builder-network:
    driver: bridge
